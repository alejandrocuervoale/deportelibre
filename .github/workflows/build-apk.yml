name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependencias del Proyecto
        run: npm install

      - name: Generar Código de Producción (Vite)
        run: |
          npm run build
          ls -R dist

      - name: Sincronizar Capacitor con Android (Reconstrucción Dinámica)
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android --no-git

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compilar APK (Debug)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Subir APK Generado
        uses: actions/upload-artifact@v4
        with:
          name: AniFlix-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
